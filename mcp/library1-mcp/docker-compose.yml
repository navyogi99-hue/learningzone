services:
  mysql:
    image: mysql:8.4
    container_name: library-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: rootpasword
      MYSQL_DATABASE: library

    ports:
      - "3306:3306"

    volumes:
      #persist database data
      - mysql_data:/var/lib/mysql
      # auto run sql init script
      - ./data:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpasword" ]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: library-phpmyadmin
    restart: unless-stopped

    depends_on:
      - mysql

    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpasword

    ports:
      - "18080:80"

volumes:
  mysql_data:
